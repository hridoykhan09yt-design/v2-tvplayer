<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Player v2.5</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }

        .live-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            background: #111;
        }

        .channel-list {
            width: 280px;
            background: #181818;
            overflow-y: auto;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
        }

        .channel-header {
            padding: 15px;
            background: #000;
            color: #fff;
            font-size: 22px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        #channelList {
            flex: 1;
            overflow-y: auto;
        }

        .channel {
            padding: 15px;
            color: #ccc;
            border-bottom: 1px solid #252525;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .channel:hover {
            background: #333;
            color: #fff;
        }

        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .topbar {
            display: flex;
            padding: 10px;
            gap: 10px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        .topbar input {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            outline: none;
        }

        .topbar input:focus {
            border-color: #007bff;
        }

        .topbar button {
            padding: 12px 20px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .topbar button:hover {
            background: #0056b3;
        }

        #player {
            width: 100%;
            height: calc(100vh - 65px);
            background: #000;
        }
    </style>
</head>
<body>

<div class="live-wrapper">
    <div class="channel-list">
        <div class="channel-header">📺 LIVE TV</div>
        <div id="channelList"></div>
    </div>

    <div class="player-section">
        <div class="topbar">
            <input id="playlistUrl" type="text" placeholder="Paste M3U Playlist URL Here">
            <button onclick="loadPlaylist()">Load Playlist</button>
        </div>
        <video id="player" controls autoplay playsinline></video>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let hls;

function playStream(url) {
    const video = document.getElementById("player");

    if (hls) {
        hls.destroy();
    }

    console.log("Playing stream directly:", url);

    if (Hls.isSupported()) {
        hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            xhrSetup: function (xhr, src) {
                xhr.withCredentials = false;
            }
        });
        hls.loadSource(url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.log("Network error, trying to recover...");
                        hls.startLoad();
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.log("Media error, trying to recover...");
                        hls.recoverMediaError();
                        break;
                    default:
                        console.error("Unrecoverable error");
                        break;
                }
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
    }

    video.play().catch(e => console.log("Playback interaction handled."));
}

async function loadPlaylist() {
    const url = document.getElementById("playlistUrl").value.trim();

    if (!url) {
        alert("Paste M3U Playlist URL");
        return;
    }

    // কোনো প্রক্সি ছাড়াই সরাসরি আগের প্লেয়ারের মতো ফেচ করবে
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Fetch failed');
        const text = await response.text();
        parseM3U(text);
    } catch (e) {
        console.log("Direct load failed, trying with web-bypasser...");
        // যদি সরাসরি ফেল মারে শুধুমাত্র তখনই অল-অরিজিন ব্যাকআপ ইউজ করবে
        try {
            const backupUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
            const response = await fetch(backupUrl);
            const text = await response.text();
            parseM3U(text);
        } catch (err) {
            alert("Failed to load playlist. Please check your internet or link active status.");
        }
    }
}

function parseM3U(content) {
    const list = document.getElementById("channelList");
    list.innerHTML = "";

    const lines = content.split(/\r?\n/);

    for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("#EXTINF")) {
            let name = lines[i].split(",").pop().trim();
            
            let stream = "";
            for (let j = i + 1; j < lines.length; j++) {
                if (lines[j].trim() && !lines[j].startsWith("#")) {
                    stream = lines[j].trim();
                    break;
                }
            }

            if (stream) {
                let div = document.createElement("div");
                div.className = "channel";
                div.innerText = name || "Unknown Channel";

                let currentStream = stream;
                div.onclick = function () {
                    playStream(currentStream);
                };

                list.appendChild(div);
            }
        }
    }
    
    if(list.children.length === 0){
        alert("No channels found in this playlist.");
    }
}
</script>

</body>
</html>
