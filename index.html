<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Player v2.1</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .live-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            background: #111;
            z-index: 999999;
        }

        .channel-list {
            width: 280px;
            background: #181818;
            overflow-y: auto;
            border-right: 2px solid #333;
        }

        .channel-header {
            padding: 15px;
            background: #000;
            color: #fff;
            font-size: 22px;
            text-align: center;
            font-weight: bold;
        }

        .channel {
            padding: 15px;
            color: #fff;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: background 0.2s;
        }

        .channel:hover {
            background: #333;
        }

        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .topbar {
            display: flex;
            padding: 10px;
            gap: 10px;
            background: #111;
        }

        .topbar input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }

        .topbar button {
            padding: 12px 20px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 4px;
        }

        .topbar button:hover {
            background: #0056b3;
        }

        #player {
            width: 100%;
            height: calc(100vh - 60px);
            background: #000;
        }
    </style>
</head>
<body>

<div class="live-wrapper">
    <div class="channel-list">
        <div class="channel-header">📺 LIVE TV</div>
        <div id="channelList"></div>
    </div>

    <div class="player-section">
        <div class="topbar">
            <input id="playlistUrl" type="text" placeholder="Paste M3U Playlist URL Here">
            <button onclick="loadPlaylist()">Load Playlist</button>
        </div>
        <video id="player" controls autoplay playsinline></video>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let hls;
const PROXY_URL = "https://api.allorigins.win/raw?url="; 

function playStream(url) {
    const video = document.getElementById("player");

    if (hls) {
        hls.destroy();
    }

    // প্রথম দফায় সরাসরি লিংকটি প্লে করার চেষ্টা করবে
    let finalUrl = url;

    // যদি সাইট HTTPS হয় আর ভিডিও লিংক HTTP হয়, তবে শুরুতেই প্রক্সি দিয়ে বাইপাস করার চেষ্টা করবে
    if (url.startsWith("http://") && location.protocol === "https:") {
        finalUrl = PROXY_URL + encodeURIComponent(url);
    }

    if (Hls.isSupported()) {
        hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            xhrSetup: function (xhr, src) {
                xhr.withCredentials = false;
            }
        });
        hls.loadSource(finalUrl);
        hls.attachMedia(video);
        
        // যদি সরাসরি বা প্রথম প্রক্সিতে ফেল মারে, তবে অল্টারনেটিভ প্রক্সি সেট করবে
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal && data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                if (!finalUrl.includes("corsproxy.io")) {
                    console.log("Stream failed, trying fallback CORS bypass...");
                    finalUrl = "https://corsproxy.io/?" + encodeURIComponent(url);
                    hls.loadSource(finalUrl);
                } else {
                    hls.destroy();
                    alert("This channel cannot be played in a web browser due to strict server restrictions. It only works in VLC/Apps.");
                }
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = finalUrl;
    }

    video.play().catch(e => console.log("Playback interaction handled."));
}

async function loadPlaylist() {
    const url = document.getElementById("playlistUrl").value.trim();

    if (!url) {
        alert("Paste M3U Playlist URL");
        return;
    }

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Direct fetch failed');
        const text = await response.text();
        parseM3U(text);
    } catch (e) {
        try {
            const targetUrl = PROXY_URL + encodeURIComponent(url);
            const response = await fetch(targetUrl);
            if (!response.ok) throw new Error('Proxy fetch failed');
            const text = await response.text();
            parseM3U(text);
        } catch (proxyError) {
            console.error(proxyError);
            alert("Playlist Load Failed!");
        }
    }
}

function parseM3U(content) {
    const list = document.getElementById("channelList");
    list.innerHTML = "";

    const lines = content.split(/\r?\n/);

    for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("#EXTINF")) {
            let name = lines[i].split(",").pop().trim();
            
            let stream = "";
            for (let j = i + 1; j < lines.length; j++) {
                if (lines[j].trim() && !lines[j].startsWith("#")) {
                    stream = lines[j].trim();
                    break;
                }
            }

            if (stream) {
                let div = document.createElement("div");
                div.className = "channel";
                div.innerText = name || "Unknown Channel";

                let currentStream = stream;
                div.onclick = function () {
                    playStream(currentStream);
                };

                list.appendChild(div);
            }
        }
    }
    
    if(list.children.length === 0){
        alert("No channels found.");
    }
}
</script>

</body>
</html>
